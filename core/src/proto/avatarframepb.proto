syntax = "proto3";

package gamepb.avatarframepb;

message AvatarFramesOwnedRequest {
    int32 scene = 1;
}

message AvatarFrameInfo {
    int64 id = 1;
    int32 type = 2;
    int64 expire_at = 3;
    bool equipped = 4;
}

message AvatarFramesOwnedReply {
    repeated AvatarFrameInfo frames = 1;
}
